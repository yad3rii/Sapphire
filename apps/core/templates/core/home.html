{% extends "base.html" %}

{% block title %}Sapphire — главная{% endblock %}

{% block content %}
<section class="hero">
    <div class="container">
        <h1 class="hero-title">
            Sapphire<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </h1>

        <p>Биржа игровых товаров, аккаунтов и услуг.</p>

        <div class="hero-actions">
            <a href="{% url 'games:game_list' %}" class="btn">Смотреть товары</a>

            {% if user.is_authenticated %}
                <a href="{% url 'users:edit_profile' %}" class="btn btn-outline">Стать продавцом</a>
            {% else %}
                <a href="{% url 'users:register' %}" class="btn btn-outline">Стать продавцом</a>
            {% endif %}
        </div>
    </div>
</section>
{% endblock %}
